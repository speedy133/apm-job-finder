services:
  - type: web
    name: apm-job-finder-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: cron
    name: apm-job-finder-ingestion
    env: node
    rootDir: backend
    schedule: "0 */6 * * *" # Every 6 hours
    buildCommand: npm install && npm run build
    startCommand: npm run start:pipeline
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
